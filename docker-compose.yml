services:

  # ─── BASE DE DATOS CENTRAL ──────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: lab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambia_esta_clave}
      POSTGRES_USER: ${POSTGRES_USER:-labadmin}
    volumes:
      - ./Docker_config/postgres/data:/var/lib/postgresql/data
      - ./Docker_config/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - lab-network

  # ─── REPOSITORIO DIGITAL (DSPACE) ───────────────────────────────
  dspace:
    image: dspace/dspace:dspace-7_x
    container_name: lab_dspace
    restart: unless-stopped
    environment:
      - db.url=jdbc:postgresql://postgres:5432/dspace
      - db.username=${POSTGRES_USER:-labadmin}
      - db.password=${POSTGRES_PASSWORD:-cambia_esta_clave}
      - dspace.server.url=http://localhost:8080/server
      - solr.server=http://solr:8983/solr
    depends_on:
      - postgres
      - solr
    ports:
      - "8080:8080"
    volumes:
      - ./Docker_config/dspace/assetstore:/dspace/assetstore
    networks:
      - lab-network

  solr:
    image: solr:8.11
    container_name: lab_solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - ./Docker_config/dspace/solr:/var/solr
    networks:
      - lab-network

  # ─── PRESERVACIÓN DIGITAL (ARCHIVEMATICA) ───────────────────────
  archivematica-dashboard:
    image: artefactual/archivematica-dashboard:latest
    container_name: lab_archivematica_dashboard
    restart: unless-stopped
    environment:
      - ARCHIVEMATICA_DASHBOARD_CLIENT_USER=${POSTGRES_USER:-labadmin}
      - ARCHIVEMATICA_DASHBOARD_CLIENT_PASSWORD=${POSTGRES_PASSWORD:-cambia_esta_clave}
      - ARCHIVEMATICA_DASHBOARD_CLIENT_HOST=postgres
      - ARCHIVEMATICA_DASHBOARD_CLIENT_DATABASE=archivematica
      # Enlaces obligatorios al motor de búsqueda y mensajería interna
      - ARCHIVEMATICA_DASHBOARD_ELASTICSEARCH_HOST=elasticsearch
      - ARCHIVEMATICA_DASHBOARD_ELASTICSEARCH_PORT=9200
      - ARCHIVEMATICA_DASHBOARD_REDIS_HOST=redis
      - ALLOWED_HOSTS=localhost,127.0.0.1
    depends_on:
      - postgres
      - elasticsearch
      - redis
    ports:
      - "8082:8000"
    volumes:
      - ./Docker_config/archivematica/sharedDirectory:/var/archivematica/sharedDirectory
    networks:
      - lab-network

  archivematica-mcp-server:
    image: artefactual/archivematica-mcp-server:latest
    container_name: lab_archivematica_mcp
    restart: unless-stopped
    environment:
      - ARCHIVEMATICA_MCP_SERVER_CLIENT_USER=${POSTGRES_USER:-labadmin}
      - ARCHIVEMATICA_MCP_SERVER_CLIENT_PASSWORD=${POSTGRES_PASSWORD:-cambia_esta_clave}
      - ARCHIVEMATICA_MCP_SERVER_CLIENT_HOST=postgres
      - ARCHIVEMATICA_MCP_SERVER_CLIENT_DATABASE=archivematica
      - ARCHIVEMATICA_MCP_SERVER_ELASTICSEARCH_HOST=elasticsearch
      - ARCHIVEMATICA_MCP_SERVER_REDIS_HOST=redis
      - ALLOWED_HOSTS=localhost,127.0.0.1
    depends_on:
      - postgres
      - elasticsearch
      - redis
    volumes:
      - ./Docker_config/archivematica/sharedDirectory:/var/archivematica/sharedDirectory
    networks:
      - lab-network

  # Motores esenciales de soporte para Archivematica (Evitan caídas del MCP)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: lab_archivematica_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"  # Limita el consumo de RAM en desarrollo
    volumes:
      - ./Docker_config/archivematica/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - lab-network

  redis:
    image: redis:6-alpine
    container_name: lab_archivematica_redis
    restart: unless-stopped
    networks:
      - lab-network

  # ─── GESTIÓN DOCUMENTAL (ORFEO) ─────────────────────────────────
  orfeo:
    image: tomcat:9-jdk11
    container_name: lab_orfeo
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_NAME=orfeo
      - DB_USER=${POSTGRES_USER:-labadmin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-cambia_esta_clave}
    depends_on:
      - postgres
    ports:
      - "8083:8080"
    volumes:
      - ./Docker_config/orfeo/webapps:/usr/local/tomcat/webapps
      - ./Docker_config/orfeo/conf:/usr/local/tomcat/conf
    networks:
      - lab-network

  # ─── PROCESAMIENTO DE TEXTO (APACHE TIKA) ───────────────────────
  tika:
    image: apache/tika:latest
    container_name: lab_tika
    restart: unless-stopped
    ports:
      - "127.0.0.1:9998:9998"   # Blindado para acceso exclusivo local/interno
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge

# NOTA DE CONTROL: AtoM corre de forma aislada desde su propio compose en ./atom-app/
# Clonar: git clone -b stable/2.9.x https://github.com/artefactual/atom.git atom-app
# Levantar: cd atom-app && docker compose up -d  → Accesible en localhost:63001
